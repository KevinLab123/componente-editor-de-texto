<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap y estilos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title>Manejador De Plantillas</title>
</head>

<body class="bg-light">
    <div class="container-fluid py-3">

        <!-- TOOLBAR -->
        <div class="card shadow-sm mb-3">
            <div class="card-body d-flex flex-wrap gap-2">

                <button class="btn btn-primary" id="btn-generate-pdf">
                    Generar PDF
                </button>

                <button class="btn btn-success" id="btn-save">
                    Guardar Documento
                </button>

                <button class="btn btn-secondary"
                        id="btn-load-template"
                        onclick="loadTemplate()">
                    Cargar Plantilla
                </button>

            </div>
        </div>

        <!-- DOCUMENTO -->
        <div class="d-flex justify-content-center">
            <div id="document-container" class="document-page bg-white shadow-sm p-4">

                <!-- HEADER -->
                <div id="doc-header" class="border-bottom pb-2 mb-3">
                    <!-- contenido de plantilla -->
                </div>

                <!-- BODY EDITABLE -->
                <div id="doc-body" class="document-body" contenteditable="true">
                    <!-- contenido editable -->
                </div>

                <!-- FOOTER -->
                <div id="doc-footer" class="border-top pt-2 mt-3">
                    <!-- footer de plantilla -->
                </div>

            </div>
        </div>

    </div>

    <!-- Librerías -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/compressorjs@1.2.1/dist/compressor.min.js"></script>

    <!-- Script del proyecto -->
    <script src="templateHandler.js"></script>

</body>
</html>
