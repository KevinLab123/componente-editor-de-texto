<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link rel="stylesheet" href="../style.css">

<title>Manejador De Plantillas</title>
</head>

<body class="bg-light">

<div class="container-fluid py-3">

<!-- Barra superior: Archivo, formato de bloque, tamaño y colores (implementación manual, sin document.execCommand) -->
<div class="row mb-3 sticky-toolbar">
    <div class="col">
        <div class="card shadow-sm">
            <div class="card-body d-flex gap-3 align-items-center flex-wrap">
                <select class="form-select w-auto" onchange="handleFileMenu(this.value); this.selectedIndex=0;">
                    <option hidden selected>Archivo</option>
                    <option value="new">Nuevo</option>
                    <option value="pdf">Guardar PDF</option>
                    <option value="save">Guardar documento</option>
                </select>
                <select class="form-select w-auto" onchange="setBlockFormatForActiveSection(this.value); this.selectedIndex=0;">
                    <option hidden selected>Formato</option>
                    <option value="h1">Encabezado 1</option>
                    <option value="h2">Encabezado 2</option>
                    <option value="h3">Encabezado 3</option>
                    <option value="h4">Encabezado 4</option>
                    <option value="h5">Encabezado 5</option>
                    <option value="h6">Encabezado 6</option>
                    <option value="p">Párrafo</option>
                </select>
                <select class="form-select w-auto" onchange="setFontSizeForActiveSection(this.value); this.selectedIndex=0;">
                    <option hidden selected>Tamaño</option>
                    <option value="10px">Pequeño</option>
                    <option value="12px">Normal</option>
                    <option value="18px">Grande</option>
                    <option value="24px">Extra grande</option>
                </select>
                <input type="color" class="form-control form-control-color" title="Color de texto"
                    oninput="applyTextColor(this.value)">
                <input type="color" class="form-control form-control-color" title="Color de fondo"
                    oninput="applyHighlightColor(this.value)">
            </div>
        </div>
    </div>
</div>



<div class="d-flex justify-content-center">

<div id="document-container" class="document-page">

<!-- ENCABEZADO (misma estructura que templateCreator, sin barra de herramientas de edición enriquecida) -->
<div class="card shadow-sm mb-3">

<div class="card-header bg-light fw-semibold">
Encabezado
</div>

<div class="card-body">
<div id="doc-header" class="form-control editor-section" style="min-height:150px;">

    <table class="doc-header-table">
        <tr>
            <td colspan="2" class="logo-cell">
                <div id="header-logo-container" class="header-logo-container"></div>
                <button id="insert-header-logo-btn" class="btn btn-outline-secondary"
                    type="button" data-html2canvas-ignore="true" onclick="insertHeaderImage()">
                    <i class="bi bi-image"></i> Insertar Logo
                </button>
            </td>
        </tr>
        <tr>
            <td class="label-cell">Consecutivo:</td>
            <td class="value-cell" contenteditable="true" data-variable="consecutivo"></td>
        </tr>
        <tr>
            <td class="label-cell">Departamento:</td>
            <td class="value-cell" contenteditable="true" data-variable="departamento"></td>
        </tr>
        <tr>
            <td class="label-cell">Fecha:</td>
            <td class="value-cell" contenteditable="true" data-variable="fecha"></td>
        </tr>
        <tr>
            <td colspan="2" class="title-cell" contenteditable="true" data-variable="titulo"></td>
        </tr>
    </table>

</div>
</div>

</div>


<!-- TOOLBAR DEL EDITOR -->
<div class="card shadow-sm mb-3 bg-light editor-toolbar">

<div class="card-body d-flex justify-content-center">

<div class="btn-toolbar gap-2 flex-wrap">

<div class="btn-group">
<button class="btn btn-outline-secondary" onclick="undo()">
<i class="bi bi-arrow-counterclockwise"></i>
</button>

<button class="btn btn-outline-secondary" onclick="redo()">
<i class="bi bi-arrow-clockwise"></i>
</button>
</div>


<div class="btn-group">
<button class="btn btn-outline-secondary" onclick="clearFormattingToParagraph()">
<i class="bi bi-eraser"></i>
</button>

<button class="btn btn-outline-secondary" onclick="bold()">
<i class="bi bi-type-bold"></i>
</button>

<button class="btn btn-outline-secondary" onclick="italic()">
<i class="bi bi-type-italic"></i>
</button>

<button class="btn btn-outline-secondary" onclick="underline()">
<i class="bi bi-type-underline"></i>
</button>

<button class="btn btn-outline-secondary" onclick="strikethrough()">
<i class="bi bi-type-strikethrough"></i>
</button>
</div>


<div class="btn-group">
<button class="btn btn-outline-secondary" onclick="alignText('left')">
<i class="bi bi-text-left"></i>
</button>

<button class="btn btn-outline-secondary" onclick="alignText('center')">
<i class="bi bi-text-center"></i>
</button>

<button class="btn btn-outline-secondary" onclick="alignText('right')">
<i class="bi bi-text-right"></i>
</button>
</div>


<div class="btn-group">
<button class="btn btn-outline-secondary" onclick="toggleList('ul')">
<i class="bi bi-list-ul"></i>
</button>

<button class="btn btn-outline-secondary" onclick="toggleList('ol')">
<i class="bi bi-list-ol"></i>
</button>
</div>


<div class="btn-group">

<button class="btn btn-outline-secondary" onclick="insertImageBase64()">
<i class="bi bi-image"></i>
</button>

<button class="btn btn-outline-primary" onclick="addLink()">
<i class="bi bi-link-45deg"></i>
</button>

</div>

</div>

</div>
</div>


<!-- CONTENIDO -->
<div class="card shadow mb-3">

<div class="card-header bg-light fw-semibold">
Contenido
</div>

<div class="card-body">

<div id="doc-body"
     class="editor-section"
     contenteditable="true">
</div>

</div>

</div>


<!-- PIE DE PAGINA -->
<div class="card shadow-sm">

<div class="card-header bg-light fw-semibold">
Pie de página
</div>

<div class="card-body">

<div id="doc-footer"
     class="footer-section footer-readonly"
     contenteditable="false"
     aria-readonly="true">
</div>

</div>

</div>

</div>

</div>

</div>

<!-- PREVISUALIZADOR -->
<div class="row mt-4">
    <div class="col-12">
        <div class="card shadow-lg">
            <div class="card-header bg-dark text-white fw-semibold">
                Previsualización PDF
            </div>
            <div class="card-body bg-light">

                <div id="pdf-preview" class="pdf-preview-area">
                    <!-- Aquí se renderiza el documento final -->
                </div>

            </div>
        </div>
    </div>
</div>


<!-- Librerías -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/compressorjs@1.2.1/dist/compressor.min.js"></script>
<script src="https://unpkg.com/@pablotheblink/flashyjs@1.0.5/flashy.js"></script>
<script src="flashy-bridge.js"></script>

<!-- Script -->
<script src="templateHandler.js"></script>

</body>
</html>
